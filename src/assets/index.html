<!DOCTYPE html>
<html class="auto-scroll-y">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://unpkg.com/react-table@6.10.0/react-table.css" />
        <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet" />
        <script src="https://kit.fontawesome.com/05579d3562.js" crossorigin="anonymous"></script>
        <title>Lavinia</title>
    </head>
    <body>
        <noscript>
            <div class="section">
                <div class="container">
                    <h1><strong>Du har ikke skrudd på JavaScript!</strong></h1>
                    <br />
                    <p>
                        Lavinia er et verktøy for å vise hvordan den norske valgordningen gjør om stemmer
                        til mandater ved stortingsvalg. Ved å justere på innstillingene for valgordningen,
                        kan du se hvordan det påvirker resultatene og hvilke partier som vinner eller taper
                        på forandringene.
                    </p>
                    <br />
                    <p>
                        En av grunnene til at Lavinia bruker JavaScript er at det tillater alle som bruker
                        verktøyet å bruke det uten noen form for logging eller overvåking. Etter kildekode
                        og data er lastet inn, forblir alt en bruker gjør i deres egen nettleser.
                    </p>
                    <br />
                    <p>
                        Hvis du ikke vet hvordan man skrur på JavaScript i nettleseren din kan du besøke
                        <a href="https://www.enable-javascript.com/no/">https://www.enable-javascript.com/no/</a> for å
                        finne ut hvordan du kan skru på JavaScript i din nettleser.
                    </p>
                </div>
            </div>
        </noscript>
        <div id="root"></div>
    </body>
</html>
